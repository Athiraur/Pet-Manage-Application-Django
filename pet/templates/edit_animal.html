{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Animal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat:400,600&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #F0E7D8;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
        }

        .signup-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            max-width: 900px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-radius: 10px;
            overflow: hidden;                                         
        }

        .left-container, .right-container {
            padding: 15px;
            text-align:left;
        }

        .left-container {
            background: #B8A99A;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .left-container h1 {
            color: #fff;
            font-size: 20px;
            margin-bottom: 10px;
        }

        .left-container img {
            width: 70%;
            border-radius: 10px;
        }

        .right-container {
            background: #F7B1AB;
            display: flex;
            flex-direction: column;
        }

        .right-container h1 {
            color: rgba(0,0,0,.8);
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
        }

        .set {
            margin-bottom: 8px;
        }

        .set label {
            margin-bottom: 3px;
            font-weight: bold;
            display: block;
        }

        .set input {
            border: 1px solid rgba(0,0,0,.2);
            border-radius: 4px;
            height: 28px;
            padding-left: 8px;
            transition: border 0.3s;
            width: 100%;
        }

        .set input:focus {
            border-color: #F7B1AB;
            outline: none;
        }

        footer {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        footer button {
            background: #807182;
            border: none;
            color: #fff;
            height: 35px;
            width: 100px;
            border-radius: 20px;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        footer button:hover {
            background: #5A4E5B;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="left-container">
            <h1><i class="fas fa-paw"></i> PET SHOP</h1>
            <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/38816/image-from-rawpixel-id-542207-jpeg.png" alt="Pet">
        </div>

        <div class="right-container">
            <header>
                <h1>Edit Animal {{ animal.pet_id }}</h1>
            </header>

            <div class="messages">
                {% for message in messages %}
                    <div class="{% if message.tags == 'success' %}success{% else %}error{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>

            <!-- Edit Animal Form -->
            <form method="POST">
                {% csrf_token %}

                <div class="set pets-id">
                    <label for="pet-id">Pet ID</label>
                    {{ form.pet_id }}
                </div>
                <div class="set pets-category">
                    <label for="pet-category">Category</label>
                    {{ form.category }}
                </div>
                <div class="set pets-breed">
                    <label for="pets-breed">Breed</label>
                    {{ form.breed }}
                </div>
                <div class="set pets-weight">
                    <label for="pets-weight">Weight (lbs)</label>
                    {{ form.weight }}
                </div>
                <div class="set pets-height">
                    <label for="pets-height">Height (inches)</label>
                    {{ form.height }}
                </div>
                <div class="set pets-age">
                    <label for="pets-age">Age (years)</label>
                    {{ form.age }}
                </div>
                <div class="set pets-fur">
                    <label for="pets-fur">Fur Type</label>
                    {{ form.fur_type }}
                </div>
                <div class="set pets-cost">
                    <label for="pets-cost">Cost ($)</label>
                    {{ form.cost }}
                </div>

                <footer>
                    <button type="submit">Save</button>
                </footer>
            </form>
        </div>
    </div>
</body>
</html>
