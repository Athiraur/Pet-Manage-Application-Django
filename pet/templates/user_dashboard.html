{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link rel="stylesheet" href="{% static 'pets/css/admin.css' %}"> <!-- Link to your CSS file -->
     <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #49193b;
            color: white;
            padding: 1px;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: right;
            background-color: #6a2c5f;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
        }

        nav ul li {
            margin: 0 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            padding: 10px;
            display: block;
        }

        .background {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h2 {
            color: #49193b;
        }

    </style>

      <style>


              .dashboard-image {
            width: 100%;
            height: 450px;
            object-fit: cover;
            display: block;
        }

        .background {
            text-align: center;
            padding: 30px;
        }
    </style>
    

</head>

<body>

    <header>
        <h1>User Dashboard</h1>
    </header>

    <nav>
        <ul>
            <li><a href="% url index.html %">Home</a></li>
            <li><a href="{% url 'add_appoinment' %}">Pets Appointment</a></li>
            <li><a href="{% url 'view_appoinment' %}">View Appointments</a></li>
            <li><a href="{% url 'index' %}">Logout</a></li>
        </ul>
    </nav>

    <img src="{% static 'images/pett.jpg' %}" alt="Dashboard Banner" class="dashboard-image">


   
</body>

</html>
